version: '3.8'

services:
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./database:/app/database # <--- O mapăm direct în interiorul aplicației
    environment:
      - PORT=8080
      - SQLITE_DB_PATH=./database/assets/health_app.db # <--- Cale simplă, relativă la rădăcina proiectului
    restart: always